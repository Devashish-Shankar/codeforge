version: "3.9"

name: codeforge

services:

  postgres:
    image: postgres:17
    container_name: codeforge-postgres

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - codeforge-network


  redis:
    image: redis:7-alpine

    container_name: codeforge-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command:
      - redis-server
      - --appendonly
      - "yes"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - codeforge-network
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1

    container_name: codeforge-zookeeper

    restart: unless-stopped

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 10s
      retries: 5

    networks:
      - codeforge-network
  
  kafka:
    image: confluentinc/cp-kafka:7.6.1

    container_name: codeforge-kafka

    restart: unless-stopped

    depends_on:
      zookeeper:
        condition: service_started

    ports:
      - "9092:9092"

    environment:

      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10

    networks:
      - codeforge-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest

    container_name: codeforge-kafka-ui

    restart: unless-stopped

    depends_on:
      kafka:
        condition: service_started

    ports:
      - "8080:8080"

    environment:

      KAFKA_CLUSTERS_0_NAME: codeforge

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

    networks:
      - codeforge-network



networks:

  codeforge-network:
    driver: bridge



volumes:

  postgres-data:

  redis-data:

  kafka-data: